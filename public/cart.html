<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Cart</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
    </nav>
  </header>
  <main>
    <div id="cart"></div>
    <div class="form-group">
      <label for="customerEmail">Customer Email</label>
      <input type="email" id="customerEmail" placeholder="customer@example.com" required>
    </div>
    <button onclick="checkout()">Checkout</button>
  </main>
  <script src="app.js"></script>
  <script>
    // Load cart
    async function loadCart() {
      const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
      if (cartItems.length === 0) {
        document.getElementById('cart').innerHTML = '<p>Cart is empty</p>';
        return;
      }
      const productsRes = await fetch('/api/products');
      const products = await productsRes.json();
      const productMap = products.reduce((map, p) => { map[p.id] = p; return map; }, {});
      const cartDiv = document.getElementById('cart');
      cartDiv.innerHTML = '<h3>Your Cart</h3>';
      cartItems.forEach(id => {
        const product = productMap[id];
        if (product) {
          cartDiv.innerHTML += `<p>${product.name} - ${product.price}</p>`;
        }
      });
    }
    loadCart();
  </script>
</body>
</html>
