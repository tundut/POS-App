<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Dashboard</title>
  <meta name="description" content="POS SaaS Dashboard — manage products, orders, staff and more.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h2>⚡ POS SaaS</h2>
        <p class="tenant-name" id="tenantName"></p>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a class="nav-item" data-page="pos" onclick="navigate('pos')">
          <span class="nav-icon">🛒</span> Create Order
        </a>
        <a class="nav-item" data-page="orders" onclick="navigate('orders')">
          <span class="nav-icon">📋</span> Orders
        </a>

        <div class="nav-section">Catalog</div>
        <a class="nav-item" data-page="categories" onclick="navigate('categories')">
          <span class="nav-icon">📁</span> Categories
        </a>
        <a class="nav-item" data-page="products" onclick="navigate('products')">
          <span class="nav-icon">📦</span> Products
        </a>
        <a class="nav-item" data-page="customers" onclick="navigate('customers')">
          <span class="nav-icon">👥</span> Customers
        </a>

        <div class="nav-section" id="adminSection" style="display:none;">Administration</div>
        <a class="nav-item" data-page="staff" onclick="navigate('staff')" id="navStaff" style="display:none;">
          <span class="nav-icon">👤</span> Staff
        </a>
        <a class="nav-item" data-page="managers" onclick="navigate('managers')" id="navManagers" style="display:none;">
          <span class="nav-icon">👔</span> Managers
        </a>
        <a class="nav-item" data-page="admins" onclick="navigate('admins')" id="navAdmins" style="display:none;">
          <span class="nav-icon">🛡️</span> Admins
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar"></div>
          <div class="user-details">
            <div class="user-name" id="userName"></div>
            <div class="user-role" id="userRole"></div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </aside>

    <!-- MOBILE HEADER -->
    <header class="mobile-header">
      <button class="btn-menu" onclick="toggleSidebar()">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <h2>⚡ POS SaaS</h2>
    </header>

    <!-- SIDEBAR OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="pageContent">
      <!-- Pages rendered dynamically by app.js -->
    </main>
  </div>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this)hideModal()"></div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
